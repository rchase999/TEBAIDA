<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DebateForge - AI-Powered Debate Arena. Watch AI models clash on any topic with real-time evidence verification, custom personas, and logical fallacy detection." />
    <meta name="author" content="DebateForge" />
    <meta name="theme-color" content="#4c6ef5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1b1e" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="application-name" content="DebateForge" />

    <!-- Open Graph -->
    <meta property="og:title" content="DebateForge - AI-Powered Debate Arena" />
    <meta property="og:description" content="Watch AI models clash on any topic with real-time evidence, custom personas, and fallacy detection." />
    <meta property="og:type" content="application/desktop" />

    <!-- CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://ui-avatars.com https://picsum.photos; connect-src 'self' http://localhost:* ws://localhost:* https://api.anthropic.com https://api.openai.com https://generativelanguage.googleapis.com https://api.mistral.ai https://api.groq.com" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Favicon (SVG primary, fallback ICO) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' style='stop-color:%234c6ef5'/><stop offset='100%25' style='stop-color:%237c3aed'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23g)'/><text y='.9em' font-size='65' x='50' text-anchor='middle' dominant-baseline='middle' dy='5'>&#x2694;</text></svg>" />

    <title>DebateForge</title>

    <!-- Global CSS custom properties (design tokens) -->
    <style>
      :root {
        --color-primary: #4c6ef5;
        --color-primary-hover: #4263eb;
        --color-primary-muted: #dbe4ff;
        --color-success: #10b981;
        --color-warning: #f59e0b;
        --color-error: #ef4444;
        --color-info: #3b82f6;
        --radius-sm: 0.375rem;
        --radius-md: 0.5rem;
        --radius-lg: 0.75rem;
        --radius-xl: 1rem;
        --radius-2xl: 1.5rem;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        --transition-fast: 150ms;
        --transition-normal: 200ms;
        --transition-slow: 300ms;
        --z-dropdown: 10;
        --z-sticky: 20;
        --z-overlay: 30;
        --z-modal: 40;
        --z-toast: 50;
      }

      .dark {
        --color-primary-muted: #364fc7;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #ced4da; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #adb5bd; }
      .dark ::-webkit-scrollbar-thumb { background: #495057; }
      .dark ::-webkit-scrollbar-thumb:hover { background: #5c5f66; }

      /* Focus ring */
      *:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }

      /* Selection */
      ::selection {
        background: rgba(76, 110, 245, 0.2);
      }

      /* Smooth number transitions */
      .tabular-nums { font-variant-numeric: tabular-nums; }

      /* Print styles */
      @media print {
        nav, aside, .no-print, [role="navigation"] { display: none !important; }
        main { margin: 0 !important; padding: 1rem !important; }
        body { background: white !important; color: black !important; }
        * { box-shadow: none !important; }
      }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Skip to content */
      .skip-to-content {
        position: absolute;
        left: -9999px;
        z-index: 999;
        padding: 0.5rem 1rem;
        background: var(--color-primary);
        color: white;
        border-radius: var(--radius-md);
        font-weight: 600;
        text-decoration: none;
      }
      .skip-to-content:focus {
        left: 1rem;
        top: 1rem;
      }
    </style>
  </head>
  <body class="bg-surface-1 dark:bg-surface-dark-0 text-gray-900 dark:text-gray-100 antialiased">
    <a href="#main-content" class="skip-to-content">Skip to content</a>
    <div id="root"></div>
    <script type="module" src="/src/ui/main.tsx"></script>
  </body>
</html>
